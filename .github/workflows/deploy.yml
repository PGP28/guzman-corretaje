name: 🚀 Deploy Frontend → cPanelHost

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    name: Build y Deploy a cPanel
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout código
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: 📦 Instalar dependencias
        run: npm ci

      - name: 🔨 Build de producción
        run: npm run build
        env:
          REACT_APP_API_URL: ${{ secrets.BACKEND_URL }}
          CI: false

      - name: 📄 Asegurar .htaccess en build
        run: |
          if [ ! -f build/.htaccess ]; then
            echo "⚠️ .htaccess no está en build/ — copiando manualmente"
            cp public/.htaccess build/.htaccess
          else
            echo "✅ .htaccess ya está en build/"
          fi

      - name: 📦 Comprimir build
        run: |
          cd build
          zip -r ../build_deploy.zip .
          cd ..
          echo "✅ build_deploy.zip creado ($(du -sh build_deploy.zip | cut -f1))"

      - name: 📤 Subir build al servidor vía SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          source: "build_deploy.zip"
          target: "/home/${{ secrets.SSH_USERNAME }}/deployments/"

      - name: 🔄 Descomprimir y reemplazar public_html
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            DEPLOY_ZIP="/home/$USER/deployments/build_deploy.zip"
            PUBLIC_HTML="/home/$USER/public_html"
            BACKUP_DIR="/home/$USER/deployments/backup_$(date +%Y%m%d_%H%M%S)"

            echo "📁 Creando backup..."
            mkdir -p "$BACKUP_DIR"
            find "$PUBLIC_HTML" -maxdepth 1 \( -name "*.html" -o -name "*.js" -o -name "*.css" -o -name ".htaccess" \) -exec cp {} "$BACKUP_DIR/" \; 2>/dev/null || true

            echo "🗑️ Limpiando public_html (sin tocar api.corretajeguzman.cl)..."
            find "$PUBLIC_HTML" -maxdepth 1 -not -name 'api.corretajeguzman.cl' -not -path "$PUBLIC_HTML" -delete 2>/dev/null || true

            echo "📦 Descomprimiendo nuevo build..."
            mkdir -p "$PUBLIC_HTML"
            unzip -o "$DEPLOY_ZIP" -d "$PUBLIC_HTML"

            echo "🗑️ Limpiando zip temporal..."
            rm "$DEPLOY_ZIP"

            echo "✅ Deploy completado en $PUBLIC_HTML"
